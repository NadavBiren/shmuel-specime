<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Carousel Tester</title>
  <style>
    /* איפוס ורקע שחור (בדומה לסקשן 02 באתר שלך) */
    body, html {
      margin: 0;
      padding: 0;
      background-color: #0F0E0C; 
      height: 100vh;
      overflow: hidden; /* מונע גלילה אנכית בטסטר */
      display: flex;
      align-items: center; /* ממרכז את הקרוסלה אנכית */
    }

    /* עטיפת הקרוסלה - מגדירה את כיוון הזרימה */
    .carousel-wrapper {
      width: 100vw;
      overflow: hidden;
      /* אנחנו כופים LTR פנימי כדי שהתמונות יסתדרו משמאל לימין 
         וכשנזיז אותן שמאלה, הן ייראו כאילו הן נכנסות מצד ימין */
      direction: ltr; 
    }

    /* המסילה שעליה יושבות כל התמונות */
    .marquee-track {
      display: flex;
      gap: 20px;
      width: max-content;
      /* כאן אפשר לשלוט במהירות - כרגע מכוון ל-60 שניות לסיבוב מלא */
      animation: scrollMarquee 60s linear infinite;
    }

    /* עצירת האנימציה בהובר */
    .marquee-track:hover {
      animation-play-state: paused;
    }

    /* בלוק תמונה בודד */
    .marquee-item {
      position: relative;
      height: 70vh;
      flex-shrink: 0;
      cursor: pointer;
    }

    /* עיצוב התמונות עצמן (הבסיס וההובר) */
    .marquee-item img {
      height: 100%;
      width: auto;
      display: block;
      object-fit: contain;
      transition: opacity 0.5s ease;
    }

    /* תמונת ההובר יושבת בדיוק מעל תמונת הבסיס ומוסתרת בהתחלה */
    .img-hover {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    /* אפקט הקרוספייד כשמרחפים על בלוק ספציפי */
    .marquee-item:hover .img-base {
      opacity: 0;
    }
    .marquee-item:hover .img-hover {
      opacity: 1;
    }

    /* האנימציה עצמה שמסיעה את המסילה שמאלה בדיוק בחצי מהאורך שלה (סט אחד של 18 תמונות) */
    @keyframes scrollMarquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <div class="carousel-wrapper">
    <div class="marquee-track" id="marquee-track">
      </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const track = document.getElementById('marquee-track');
      const numImages = 18; // מספר התמונות הייחודיות שיש לך
      const basePath = '../assets/images/digitize-letters/'; // הנתיב המעודכן

      // פונקציה שמייצרת סט של 18 תמונות (בסיס + הובר)
      function createSet() {
        const fragment = document.createDocumentFragment();
        
        for (let i = 1; i <= numImages; i++) {
          const item = document.createElement('div');
          item.className = 'marquee-item';

          // תמונת הבסיס
          const imgBase = document.createElement('img');
          imgBase.className = 'img-base';
          imgBase.src = `${basePath}scan-to-font-document${i}.jpg`;
          imgBase.alt = `מסמך מקור ${i}`;

          // תמונת ההובר
          const imgHover = document.createElement('img');
          imgHover.className = 'img-hover';
          imgHover.src = `${basePath}scan-to-font-document-hover${i}.jpg`;
          imgHover.alt = `עיבוד דיגיטלי ${i}`;

          // הכנסת התמונות לתוך הבלוק והוספה לזיכרון
          item.appendChild(imgBase);
          item.appendChild(imgHover);
          fragment.appendChild(item);
        }
        
        return fragment;
      }

      // אנחנו מדפיסים את הסט פעמיים לתוך ה-HTML כדי ליצור את הלופ האינסופי!
      track.appendChild(createSet());
      track.appendChild(createSet());
    });
  </script>

</body>
</html>
