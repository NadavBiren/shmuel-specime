<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fingers Animation</title>

  <style>
    :root {
      --yellow: #f5f000;
      --black: #151515;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--yellow);
      overflow-x: hidden;
    }

    .fingers-section {
      position: relative;
      min-height: 220vh;
      background: var(--yellow);
    }

    .fingers-stage {
      position: sticky;
      top: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--yellow);
    }

    /* שכבה 1 — הטקסט הסטטי */
    .finger-text-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .finger-text-layer img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* שכבה 2 — כל האנימציה */
    .animation-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .finger {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .finger-top {
      z-index: 3;
      transform: translateX(12%);
    }

    .finger-bottom {
      z-index: 1;
      transform: translateX(0%);
    }

    /*
      ה-wrapper של הפקק:
      כאן ממקמים את הפקק על המסך.
      ה-wrapper לא מסתובב.
      רק ה-img שבתוכו מסתובב.
    */
    .cap-wrap {
    position: absolute;
    z-index: 2;
    right: -2vw;
    top: 49vh;
    width: 26vw;
    aspect-ratio: 1 / 1;
    transform: translate(-50%, -50%);
}
    .cap {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;

      transform-origin: 50% 50%;
      transform: rotate(0deg);
    }

    /*
      אופציונלי לבדיקה:
      תוריד comment כדי לראות את המסגרת של הפקק.
    */
    /*
    .cap-wrap {
      outline: 1px solid red;
    }
    */
  </style>
</head>

<body>

  <section class="fingers-section" id="fingersSection">

    <div class="fingers-stage">

      <!-- שכבה 1: טקסט סטטי -->
      <div class="finger-text-layer">
        <img
          src="/site/assets/images/svg/fingers-animation/finger-text.svg"
          alt=""
        />
      </div>

      <!-- שכבה 2: אצבעות + פקק -->
      <div class="animation-layer">

        <img
          class="finger finger-top"
          id="fingerTop"
          src="/site/assets/images/svg/fingers-animation/finger-top.svg"
          alt=""
        />

        <img
          class="finger finger-bottom"
          id="fingerBottom"
          src="/site/assets/images/svg/fingers-animation/finger-bottom.svg"
          alt=""
        />

        <div class="cap-wrap" id="capWrap">
          <img
            class="cap"
            id="cap"
            src="/site/assets/images/svg/fingers-animation/cap.svg"
            alt=""
          />
        </div>

      </div>

    </div>

  </section>

  <script>
    const section = document.querySelector("#fingersSection");
    const fingerTop = document.querySelector("#fingerTop");
    const fingerBottom = document.querySelector("#fingerBottom");
    const cap = document.querySelector("#cap");

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateAnimation() {
      const rect = section.getBoundingClientRect();
      const scrollableDistance = section.offsetHeight - window.innerHeight;

      const progress = clamp(-rect.top / scrollableDistance, 0, 1);

      /*
        כאן מדייקים את התנועה.
      */

      // האצבע העליונה: מתחילה מימין ומגיעה למיקום הסופי שלה
      const topStartX = 22;
      const topEndX = 0;
      const topX = topStartX + (topEndX - topStartX) * progress;

      // האצבע התחתונה: מתחילה במקום שלה וממשיכה ימינה
      const bottomStartX = 4;
      const bottomEndX = 14;
      const bottomX = bottomStartX + (bottomEndX - bottomStartX) * progress;

      // הפקק: מסתובב במקום עם כיוון השעון
      const capStartRotation = 0;
      const capEndRotation = -340;
      const capRotation =
        capStartRotation + (capEndRotation - capStartRotation) * progress;

      fingerTop.style.transform = `translateX(${topX}%)`;
      fingerBottom.style.transform = `translateX(${bottomX}%)`;
      cap.style.transform = `rotate(${capRotation}deg)`;
    }

    window.addEventListener("scroll", updateAnimation);
    window.addEventListener("resize", updateAnimation);

    updateAnimation();
  </script>

</body>
</html>
