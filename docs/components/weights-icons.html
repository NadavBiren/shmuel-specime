<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shmuel - Weights Layout</title>
  <style>
    /* =========================================
       1. Base CSS (From your provided file)
       ========================================= */
    @font-face {
      font-family: 'Shmuel';
      src: url('../assets/fonts/shmuel-Regular.ttf') format('truetype');
      font-weight: 500 900;
      font-display: block;
    }

    @font-face {
      font-family: 'SimplerMono';
      src: url('../assets/fonts/SimplerPro_HLAR_Mono-Regular.otf') format('opentype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'SimplerMono';
      src: url('../assets/fonts/SimplerPro_HLAR_Mono-Medium.otf') format('opentype');
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: 'SimplerMono';
      src: url('../assets/fonts/SimplerPro_HLAR_Mono-Bold.otf') format('opentype');
      font-weight: 700;
      font-display: swap;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      color-scheme: dark;

      /* Core palette */
      --color-main:   #FF1493;   /* neon pink */
      --color-second: #FFFF00;   /* neon yellow */
      --color-third:  #FF5E00;   /* neon orange */
      --color-fourth: #39FF14;   /* neon green */

      --color-black:  #0F0E0C;
      --color-dark:   #3A3835;
      --color-grey:   #7A7875;
      --color-lightgrey: #c0c0c0;
      --color-white:  #F5F2ED;

      /* Typography */
      --font-primary: 'Shmuel', serif;
      --font-secondary: 'SimplerMono', 'Courier New', monospace;

      /* === NEW VARIABLES FOR THIS LAYOUT === */
      --center-gap: 1.5vw;      /* המרחק המדויק בין העברית לאנגלית */
      --icon-size: 18vw;      /* גודל בסיס לדימויים המרחפים */
    }

    html {
      direction: rtl;
      font-size: 16px;
      background-color: #000; /* שחור מוחלט לרקע כמו ברפרנס */
    }

    body {
      font-family: var(--font-primary);
      color: var(--color-white);
      background-color: #000;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden; /* מניעת גלילה מהמיקומים האבסולוטיים */
      min-height: 100vh;
      position: relative;
    }

    /* =========================================
       2. Layout Specific CSS
       ========================================= */

    /* אזור הטקסט המרכזי */
    .center-stage {
      position: absolute;
      top: 54%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      direction: ltr; /* מכריח את העברית להיות בשמאל והאנגלית בימין ויזואלית */
      gap: var(--center-gap);
      align-items: center;
      color: var(--color-main);
      width: max-content;
      z-index: 10;
    }

    .text-column {
      display: flex;
      flex-direction: column;
      gap: 1.35vh; /* מרווח בין השורות במרכז */
    }

    .col-hebrew {
      text-align: right; /* למרות המיקום השמאלי, הטקסט מיושר לימין העמודה */
      direction: rtl;
    }

    .col-english {
      text-align: left; /* מיושר לשמאל העמודה */
    }

    .center-text-item {
      font-size: 50px;
      line-height: 1;
      margin: 0;
    }

    .center-text-item:not(.weights-title) {
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      transform-origin: center;
    }


    .col-hebrew .center-text-item:not(.weights-title) { padding-right: 0.3em; }
    .col-english .center-text-item:not(.weights-title) { padding-left: 0.3em; }

    /* קלאסים למשקלים */
    .w-500 { font-weight: 500; }
    .w-700 { font-weight: 700; }
    .w-900 { font-weight: 900; }

    .weights-title {
      background-color: var(--color-main);
      color: #000;
      padding: 0.1em 0.3em;
      width: 185px;
      display: flex;
    }

    .col-hebrew .weights-title { justify-content: flex-start; }
    .col-english .weights-title { justify-content: flex-start; direction: ltr; }

    .weights-title span {
      display: inline-block;
      min-width: 0.1em;
      animation: letter-wave-animation 1.6s ease-in-out infinite alternate;
    }

    @keyframes letter-wave-animation {
      from { font-variation-settings: 'wght' 500; }
      to   { font-variation-settings: 'wght' 900; }
    }

    /* דימויים מרחפים */
    .weight-icon-wrapper {
      position: absolute;
      width: var(--icon-size);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 5;
      cursor: pointer;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .svg-icon-mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-color: var(--color-main);
      mask-size: contain;
      -webkit-mask-size: contain;
      mask-repeat: no-repeat;
      -webkit-mask-repeat: no-repeat;
      mask-position: center;
      -webkit-mask-position: center;
    }

    .icon-1 {
      mask-image: url('../assets/images/svg/weights-icon-1.svg');
      -webkit-mask-image: url('../assets/images/svg/weights-icon-1.svg');
    }

    .icon-2 {
      mask-image: url('../assets/images/svg/weights-icon-2.svg');
      -webkit-mask-image: url('../assets/images/svg/weights-icon-2.svg');
    }

    .icon-3 {
      mask-image: url('../assets/images/svg/weights-icon-3.svg');
      -webkit-mask-image: url('../assets/images/svg/weights-icon-3.svg');
    }

    .icon-4 {
      mask-image: url('../assets/images/svg/weights-icon-4.svg');
      -webkit-mask-image: url('../assets/images/svg/weights-icon-4.svg');
    }

    .icon-5 {
      mask-image: url('../assets/images/svg/weights-icon-5.svg');
      -webkit-mask-image: url('../assets/images/svg/weights-icon-5.svg');
    }

    .icon-6 {
      mask-image: url('../assets/images/svg/weights-icon-6.svg');
      -webkit-mask-image: url('../assets/images/svg/weights-icon-6.svg');
    }

    .weight-icon-text {
      position: relative;
      z-index: 2;
      color: #000;
      font-size: clamp(1.2rem, 2.35vw, 3rem);
      line-height: 0.85;
      padding: 10%; 
    }


    .weights-icon-1 { top: -7%; right: -5%; transform: rotate(-8deg); width: 38vw; }
    .weights-icon-2 { top: -2%; right: 25%; transform: rotate(8deg); width: 22.5vw; }
    .weights-icon-3 { bottom: 0%; right: 38%; transform: rotate(-6deg); width: 16vw; }
    .weights-icon-4 { top: -4%; left: 26%; transform: rotate(-24deg); width: 24vw; }
    .weights-icon-5 { bottom: 2%; left: 7%; transform: rotate(-10deg); width: 27vw;  }
    .weights-icon-6 { top: -60%; left: -16%; transform: rotate(15deg); width: 60vw; }

    /* טריגרים: ריחוף על טקסט מרכזי או על האייקון עצמו מגדיל ומסבב את האייקון המשויך */
    body:has(#en-bold:hover) .weights-icon-1, .weights-icon-1:hover { transform: scale(1.15) rotate(-3deg); z-index: 10; }
    body:has(#en-regular:hover) .weights-icon-2, .weights-icon-2:hover { transform: scale(1.15) rotate(3deg); z-index: 10; }
    body:has(#en-black:hover) .weights-icon-3, .weights-icon-3:hover { transform: scale(1.15) rotate(-1deg); z-index: 10; }
    body:has(#he-regular:hover) .weights-icon-4, .weights-icon-4:hover { transform: scale(1.15) rotate(-19deg); z-index: 10; }
    body:has(#he-black:hover) .weights-icon-5, .weights-icon-5:hover { transform: scale(1.15) rotate(15deg); z-index: 10; }
    body:has(#he-bold:hover) .weights-icon-6, .weights-icon-6:hover { transform: scale(1.15) rotate(-20deg); z-index: 10; }

    /* טריגרים: ריחוף על אייקון מגדיל את הטקסט המרכזי המשויך */
    body:has(.weights-icon-1:hover) #en-bold, #en-bold:hover { transform: scale(1.12); }
    body:has(.weights-icon-2:hover) #en-regular, #en-regular:hover { transform: scale(1.12); }
    body:has(.weights-icon-3:hover) #en-black, #en-black:hover { transform: scale(1.12); }
    body:has(.weights-icon-4:hover) #he-regular, #he-regular:hover { transform: scale(1.12); }
    body:has(.weights-icon-5:hover) #he-black, #he-black:hover { transform: scale(1.12); }
    body:has(.weights-icon-6:hover) #he-bold, #he-bold:hover { transform: scale(1.12); }

    /* 1: Triple Belgian Beer — תווית שחורה מתחת לאייקון */
    .weights-icon-1 .weight-icon-text {
      transform: translateY(50%);
      color: var(--color-main);
      padding: 0.3em 0.6em;
      font-size: clamp(1.2rem, 5vw, 15vw);
      top: 2.5%;
    }

    /* 2: Jin & Tonic — טקסט מוגדל */
    .weights-icon-2 .weight-icon-text {
      font-size: clamp(3.5rem, 5.5vw, 8.5rem);
    }

    /* 3: Whisky on the Rocks — טקסט מחוץ לאייקון, מימין */
    .weights-icon-3 .weight-icon-text {
      position: absolute;
      top: 52%;
      right: auto;
      left: 97%;
      transform: translateY(-50%);
      color: var(--color-main);
      text-align: left;
      white-space: nowrap;
      padding: 0;
    font-size: clamp(1.8rem, 5.3vw, 12vw);

    }

    /* 4: יין סוביניון בלאן — טקסט מוגדל ומוגבה */
    .weights-icon-4 .weight-icon-text {
      font-size: clamp(1.8rem, 5vw, 4.5rem);
      transform: translateY(-20%);
      top: 7px;
    }

    /* 5: עלית הערק איילים — טקסט מוגדל */
    .weights-icon-5 .weight-icon-text {
      font-size: clamp(3.6rem, 7vw, 10vw);
    }

    /* 6: טובי 60 — טקסט מוזז למטה */
    .weights-icon-6 .weight-icon-text {
      transform: translateY(45%);
      top: 10%;
      color: var(--color-main);
      font-size: clamp(2.4rem, 8.5vw, 20vw);
      line-height: 0.75;
      font-weight: 700;
    }

  </style>
</head>
<body>

  <div class="center-stage">
    
    <div class="text-column col-hebrew">
      <div class="center-text-item weights-title" id="title-he">משקלים</div>
      <div class="center-text-item w-500" id="he-regular">רגיל</div>
      <div class="center-text-item w-700" id="he-bold">כבד</div>
      <div class="center-text-item w-900" id="he-black">בלאק</div>
    </div>

    <div class="text-column col-english">
      <div class="center-text-item weights-title" id="title-en">Weights</div>
      <div class="center-text-item w-500" id="en-regular">Regular</div>
      <div class="center-text-item w-700" id="en-bold">Bold</div>
      <div class="center-text-item w-900" id="en-black">Black</div>
    </div>

  </div>

  <div class="weight-icon-wrapper weights-icon-1">
    <div class="svg-icon-mask icon-1"></div>
    <div class="weight-icon-text w-700">Triple<br>Belgian<br>Beer</div>
  </div>

  <div class="weight-icon-wrapper weights-icon-2">
    <div class="svg-icon-mask icon-2"></div>
    <div class="weight-icon-text w-500">Aperol<br>Spritz</div>
  </div>

  <div class="weight-icon-wrapper weights-icon-3">
    <div class="svg-icon-mask icon-3"></div>
    <div class="weight-icon-text w-900">Whisky<br>on the<br>Rocks</div>
  </div>

  <div class="weight-icon-wrapper weights-icon-4">
    <div class="svg-icon-mask icon-4"></div>
    <div class="weight-icon-text w-500">יין לבן<br>סוביניון<br>בלאן</div>
  </div>

  <div class="weight-icon-wrapper weights-icon-5">
    <div class="svg-icon-mask icon-5"></div>
    <div class="weight-icon-text w-900">עלית<br>ערק<br>איילים</div>
  </div>

  <div class="weight-icon-wrapper weights-icon-6">
    <div class="svg-icon-mask icon-6"></div>
    <div class="weight-icon-text w-700">ג׳ין<br>וטוניק</div>
  </div>

  <script>
    function createWaveEffect(elementId) {
      const el = document.getElementById(elementId);
      if (!el) return;
      const text = el.textContent.trim();
      el.innerHTML = '';
      [...text].forEach((char, index) => {
        const span = document.createElement('span');
        span.textContent = char === ' ' ? ' ' : char;
        span.style.animationDelay = `${index * 0.15}s`;
        el.appendChild(span);
      });
    }
    document.addEventListener('DOMContentLoaded', () => {
      createWaveEffect('title-he');
      createWaveEffect('title-en');
    });
  </script>

</body>
</html>
